# ClusterSecretStore for External Secrets Operator (Phase 2)
#
# Tells ESO: "when any ExternalSecret references this store by name, authenticate
# as the pod's ServiceAccount (IRSA) and fetch secrets from AWS Secrets Manager
# in us-east-1."
#
# Prerequisites (see MULTI-ACCOUNT.md "Phase 2"):
#   1. terraform apply (creates eso_irsa_role_arn)
#   2. helm install external-secrets/external-secrets -n external-secrets
#   3. kubectl -n external-secrets annotate sa external-secrets \
#        eks.amazonaws.com/role-arn=<eso_irsa_role_arn>
#   4. kubectl apply -f deploy/cluster-secret-store.yaml   ← this file
#
# After this is Ready, each chart release with externalSecrets.enabled=true
# will render an ExternalSecret that references this store.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/part-of: aws-devops-agent-external-mcp
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          # ESO's own ServiceAccount; its IRSA annotation is what authenticates
          # to Secrets Manager. All ExternalSecrets in all namespaces share it.
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
