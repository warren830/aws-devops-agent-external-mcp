apiVersion: v1
kind: Namespace
metadata: { name: mcp }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: aws-global, namespace: mcp }
spec:
  replicas: 2
  selector: { matchLabels: { app: aws-global } }
  template:
    metadata: { labels: { app: aws-global } }
    spec:
      containers:
        - name: mcp
          image: 034362076319.dkr.ecr.us-east-1.amazonaws.com/aws-devops-agent-external-mcp:latest
          command: ["python", "-m", "awslabs.aws_api_mcp_server.server"]
          env:
            - { name: AWS_API_MCP_TRANSPORT, value: "streamable-http" }
            - { name: AWS_API_MCP_HOST,      value: "0.0.0.0" }
            - { name: AWS_API_MCP_PORT,      value: "8000" }
            - { name: AUTH_TYPE,             value: "no-auth" }
            - { name: AWS_API_MCP_ALLOWED_HOSTS,   value: "aws-global.yingchu.cloud" }
            - { name: AWS_API_MCP_ALLOWED_ORIGINS, value: "aws-global.yingchu.cloud" }
            - { name: AWS_DEFAULT_REGION,    value: "us-east-1" }
            - { name: AWS_ACCESS_KEY_ID,     valueFrom: { secretKeyRef: { name: mcp-creds, key: AWS_GLOBAL_AK } } }
            - { name: AWS_SECRET_ACCESS_KEY, valueFrom: { secretKeyRef: { name: mcp-creds, key: AWS_GLOBAL_SK } } }
          ports: [{ containerPort: 8000 }]
          readinessProbe:
            tcpSocket: { port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: aws-cn, namespace: mcp }
spec:
  replicas: 2
  selector: { matchLabels: { app: aws-cn } }
  template:
    metadata: { labels: { app: aws-cn } }
    spec:
      containers:
        - name: mcp
          image: 034362076319.dkr.ecr.us-east-1.amazonaws.com/aws-devops-agent-external-mcp:latest
          command: ["python", "-m", "awslabs.aws_api_mcp_server.server"]
          env:
            - { name: AWS_API_MCP_TRANSPORT, value: "streamable-http" }
            - { name: AWS_API_MCP_HOST,      value: "0.0.0.0" }
            - { name: AWS_API_MCP_PORT,      value: "8000" }
            - { name: AUTH_TYPE,             value: "no-auth" }
            - { name: AWS_API_MCP_ALLOWED_HOSTS,   value: "aws-cn.yingchu.cloud" }
            - { name: AWS_API_MCP_ALLOWED_ORIGINS, value: "aws-cn.yingchu.cloud" }
            - { name: AWS_DEFAULT_REGION,    value: "cn-north-1" }
            - { name: AWS_ACCESS_KEY_ID,     valueFrom: { secretKeyRef: { name: mcp-creds, key: AWS_CN_AK } } }
            - { name: AWS_SECRET_ACCESS_KEY, valueFrom: { secretKeyRef: { name: mcp-creds, key: AWS_CN_SK } } }
          ports: [{ containerPort: 8000 }]
          readinessProbe:
            tcpSocket: { port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: aws-global, namespace: mcp }
spec:
  selector: { app: aws-global }
  ports: [{ port: 8000, targetPort: 8000 }]
---
apiVersion: v1
kind: Service
metadata: { name: aws-cn, namespace: mcp }
spec:
  selector: { app: aws-cn }
  ports: [{ port: 8000, targetPort: 8000 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp
  namespace: mcp
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:034362076319:certificate/74d2cea3-a33c-4841-920b-1d878a629c3a
    alb.ingress.kubernetes.io/healthcheck-port: "traffic-port"
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: "/mcp"
    alb.ingress.kubernetes.io/success-codes: "200,404,406"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
spec:
  rules:
    - host: aws-global.yingchu.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: aws-global, port: { number: 8000 } } }
    - host: aws-cn.yingchu.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: aws-cn, port: { number: 8000 } } }
