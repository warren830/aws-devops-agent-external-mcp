# secret-template.yaml — DO NOT COMMIT REAL VALUES.
#
# Use as a template only. Render real values with envsubst, kustomize, or
# create the secret directly via `kubectl create secret`:
#
#   kubectl -n bjs-web create secret generic bjs-todo-db-secret \
#     --from-literal=DATABASE_URL="postgresql://todo:${DB_PASSWORD}@bjs-todo-db.cn-north-1.rds.amazonaws.com.cn:5432/todos" \
#     --from-literal=DB_PASSWORD="${DB_PASSWORD}"
#
apiVersion: v1
kind: Secret
metadata:
  name: bjs-todo-db-secret
  namespace: bjs-web
type: Opaque
stringData:
  DATABASE_URL: "postgresql://todo:REPLACE_ME@bjs-todo-db.cn-north-1.rds.amazonaws.com.cn:5432/todos"
  DB_PASSWORD: "REPLACE_ME"
