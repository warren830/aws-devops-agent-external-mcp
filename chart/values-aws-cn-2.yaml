# aws-cn-2: 第二个 AWS 中国区账号（cn-north-1 / Beijing）
# 演示加账号的成本：1 个 values 文件 + 1 个 Secrets Manager key + 1 条 CNAME

account:
  name: aws-cn-2
  awsRegion: cn-north-1
  host: aws-cn-2.yingchu.cloud
  secretsManagerKey: /mcp/aws-cn-2

externalSecrets:
  enabled: true
  secretStoreName: aws-secrets-manager
