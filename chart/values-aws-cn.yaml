# aws-cn: AWS 中国区 MCP Server
# ⚠️ 中国区账号凭证跟全球区完全隔离（不同 partition），要用 amazonaws.cn 签的 AK/SK

account:
  name: aws-cn
  awsRegion: cn-northwest-1
  host: aws-cn.yingchu.cloud

  # Mode B：ESO + Secrets Manager
  secretsManagerKey: /mcp/aws-cn

externalSecrets:
  enabled: true
  secretStoreName: aws-secrets-manager
