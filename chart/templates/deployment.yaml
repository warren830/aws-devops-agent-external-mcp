apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels: {{- include "mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "mcp.labels" . | nindent 8 }}
    spec:
      containers:
        - name: mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ .Values.mcpServer.command | toJson }}
          env:
            - name: AWS_API_MCP_TRANSPORT
              value: streamable-http
            - name: AWS_API_MCP_STATELESS_HTTP
              value: {{ .Values.mcpServer.statelessHttp | quote }}
            - name: AWS_API_MCP_HOST
              value: "0.0.0.0"
            - name: AWS_API_MCP_PORT
              value: {{ .Values.mcpServer.port | quote }}
            - name: AUTH_TYPE
              value: {{ .Values.mcpServer.authType | quote }}
            - name: AWS_API_MCP_ALLOWED_HOSTS
              value: {{ .Values.account.host | quote }}
            - name: AWS_API_MCP_ALLOWED_ORIGINS
              value: {{ .Values.account.host | quote }}
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.account.awsRegion | quote }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "mcp.secretName" . }}
                  key: {{ include "mcp.akSecretKey" . }}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mcp.secretName" . }}
                  key: {{ include "mcp.skSecretKey" . }}
            {{- with .Values.account.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.mcpServer.port }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.mcpServer.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
