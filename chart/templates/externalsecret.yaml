{{- if .Values.externalSecrets.enabled -}}
# ESO reconciles this into a K8s Secret named mcp.secretName, fetching credentials
# from AWS Secrets Manager via the ClusterSecretStore.
#
# Secrets Manager secret expected format (JSON string):
#   {"AK": "AKIA...", "SK": "..."}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "mcp.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels: {{- include "mcp.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ include "mcp.fullname" . }}
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: {{ required "account.secretsManagerKey must be set when externalSecrets.enabled=true" .Values.account.secretsManagerKey }}
        property: AK
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: {{ .Values.account.secretsManagerKey }}
        property: SK
{{- end }}
