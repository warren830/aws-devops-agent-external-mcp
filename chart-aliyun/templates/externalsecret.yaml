{{- if .Values.externalSecrets.enabled -}}
# Expected Secrets Manager entry format:
#   key: {{ .Values.account.secretsManagerKey }}
#   value: {"AK": "LTAI...", "SK": "..."}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "mcp.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels: {{- include "mcp.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ include "mcp.fullname" . }}
    creationPolicy: Owner
  data:
    - secretKey: ALIBABA_CLOUD_ACCESS_KEY_ID
      remoteRef:
        key: {{ required "account.secretsManagerKey must be set when externalSecrets.enabled=true" .Values.account.secretsManagerKey }}
        property: AK
    - secretKey: ALIBABA_CLOUD_ACCESS_KEY_SECRET
      remoteRef:
        key: {{ .Values.account.secretsManagerKey }}
        property: SK
{{- end }}
