services:
  aws-global:
    image: python:3.12-slim
    command:
      - sh
      - -c
      - >-
        pip install --quiet 'awslabs.aws-api-mcp-server==1.3.33' &&
        exec python -m awslabs.aws_api_mcp_server.server
    environment:
      AWS_API_MCP_TRANSPORT: streamable-http
      AWS_API_MCP_HOST: 0.0.0.0
      AWS_API_MCP_PORT: "8000"
      AUTH_TYPE: no-auth
      AWS_API_MCP_ALLOWED_HOSTS: "*"
      AWS_API_MCP_ALLOWED_ORIGINS: "*"
      AWS_ACCESS_KEY_ID: ${AWS_GLOBAL_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_GLOBAL_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_GLOBAL_REGION:-us-east-1}
    ports: ["8001:8000"]

  aws-cn:
    image: python:3.12-slim
    command:
      - sh
      - -c
      - >-
        pip install --quiet 'awslabs.aws-api-mcp-server==1.3.33' &&
        exec python -m awslabs.aws_api_mcp_server.server
    environment:
      AWS_API_MCP_TRANSPORT: streamable-http
      AWS_API_MCP_HOST: 0.0.0.0
      AWS_API_MCP_PORT: "8000"
      AUTH_TYPE: no-auth
      AWS_API_MCP_ALLOWED_HOSTS: "*"
      AWS_API_MCP_ALLOWED_ORIGINS: "*"
      AWS_ACCESS_KEY_ID: ${AWS_CN_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_CN_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_CN_REGION:-cn-north-1}
    ports: ["8002:8000"]

  aliyun:
    image: python:3.12-slim
    command:
      - sh
      - -c
      - >-
        pip install --quiet 'alibaba-cloud-ops-mcp-server==0.9.27' &&
        exec python -m alibaba_cloud_ops_mcp_server
        --transport streamable-http
        --host 0.0.0.0 --port 8000
        --env ${ALIYUN_ENV:-domestic}
    environment:
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
    ports: ["8003:8000"]

  # GCP: uses the OFFICIAL Google image, not our Python image.
  # Scope limited to Cloud Run + related services — see README.
  gcp:
    image: us-docker.pkg.dev/cloudrun/container/mcp:latest
    environment:
      PORT: "8000"
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      GOOGLE_CLOUD_REGION: ${GOOGLE_CLOUD_REGION:-us-central1}
      GOOGLE_APPLICATION_CREDENTIALS: /var/secrets/gcp/key.json
    volumes:
      # Point to a local service-account JSON. NEVER commit this file.
      - ${GCP_SA_KEY_FILE:-./gcp-sa-key.json}:/var/secrets/gcp/key.json:ro
    ports: ["8004:8000"]
