    <text x="60" y="528" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="22" fill="#9AA0A6">同时关联 ALB metric / RDS CPU / Pod logs / CloudTrail 事件 — 完整跨源</text>
  </g>

  <g id="case-stats">
