      <text x="80" y="618" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="32" font-weight="900" fill="#FF9800">98</text>
      <text x="116" y="618" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">次 cn API 调用</text>
      <text x="80" y="645" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#6B7280">单次 incident · 100% 经 MCP Bridge</text>
    </g>
    <g id="stat-2">
      <rect x="320" y="580" width="240" height="80" rx="10" fill="#1A2332" stroke="#42A5F5" stroke-width="1"/>
      <text x="340" y="618" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="32" font-weight="900" fill="#42A5F5">5</text>
      <text x="364" y="618" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">个 sub-agent 并行</text>
      <text x="340" y="645" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#6B7280">alb · eks · rds · cloudtrail · pod-logs</text>
    </g>
    <g id="stat-3">
      <rect x="580" y="580" width="240" height="80" rx="10" fill="#1A2332" stroke="#4CAF50" stroke-width="1"/>
      <text x="600" y="618" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="32" font-weight="900" fill="#4CAF50">3</text>
      <text x="624" y="618" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">个 cause + 6+ 观察</text>
      <text x="600" y="645" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#6B7280">根因层级清晰 · 9 分 49 秒完成</text>
