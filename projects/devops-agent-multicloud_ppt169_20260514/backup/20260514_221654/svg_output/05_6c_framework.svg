      <text x="138" y="254" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#9AA0A6">上下文 / 拓扑智能</text>
      <line x1="80" y1="280" x2="420" y2="280" stroke="#2D3748" stroke-width="1"/>
      <text x="80" y="308" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#E8EAED">CloudWatch + GitHub + IaC + Trace</text>
      <text x="80" y="328" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#E8EAED">多源在一次调查里同时关联</text>
    </g>

