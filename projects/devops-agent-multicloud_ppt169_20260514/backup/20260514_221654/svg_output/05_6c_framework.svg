    <text x="80" y="78" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" font-weight="600" fill="#FF9800" letter-spacing="3">6C FRAMEWORK · 速查</text>
    <text x="60" y="128" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="36" font-weight="800" fill="#E8EAED">DevOps Agent 与普通 LLM 包装层的<tspan fill="#FF9800">六个差异点</tspan></text>
    <text x="60" y="160" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" fill="#9AA0A6">"6 个 C" 不是营销分类，是具体的工程投入 — 后面 3 个 case 会分别映射到不同 C</text>
