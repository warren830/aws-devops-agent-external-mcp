<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="c1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <radialGradient id="c1Glow" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1565C0" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#1565C0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="c1GlowWarn" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#FF9800" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="0"/>
    </radialGradient>
    <filter id="c1Glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feFlood flood-color="#42A5F5" flood-opacity="0.45"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g id="bg-base">
    <rect width="1280" height="720" fill="#0F1419"/>
    <rect width="1280" height="720" fill="url(#c1Glow)"/>
    <rect width="1280" height="720" fill="url(#c1GlowWarn)"/>
  </g>

  <g id="bg-decoration">
    <text x="60" y="280" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="380" font-weight="900" fill="#1565C0" fill-opacity="0.10">C1</text>
    <line x1="80" y1="540" x2="200" y2="540" stroke="#FF9800" stroke-width="2"/>
    <circle cx="1140" cy="160" r="3" fill="#42A5F5" fill-opacity="0.6"/>
    <circle cx="1180" cy="220" r="2" fill="#42A5F5" fill-opacity="0.5"/>
    <circle cx="1100" cy="600" r="2.5" fill="#FF9800" fill-opacity="0.5"/>
  </g>

  <g id="case-eyebrow">
    <use data-icon="tabler-filled/bolt" x="60" y="155" width="32" height="32" fill="#FF9800"/>
    <text x="100" y="178" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" font-weight="600" fill="#FF9800" letter-spacing="6">CASE 1 · WEBHOOK AUTONOMOUS INVESTIGATION</text>
  </g>

  <g id="case-title">
    <text x="60" y="320" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="80" font-weight="900" fill="#E8EAED">Webhook 自主调查</text>
    <text x="60" y="400" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="80" font-weight="900" fill="url(#c1Grad)">人没碰按钮，agent 全程接管</text>
  </g>

  <g id="case-subtitle">
    <line x1="60" y1="460" x2="160" y2="460" stroke="#FF9800" stroke-width="3"/>
    <text x="60" y="500" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="22" fill="#9AA0A6">alarm 触发 90 秒，bridge POST webhook 200 OK</text>
    <text x="60" y="528" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="22" fill="#9AA0A6">Agent 12 分钟出 RCA + 4 阶段 Mitigation Plan + Slack 自主投递</text>
  </g>

  <g id="case-stats">
    <g id="stat-1">
      <rect x="60" y="580" width="240" height="80" rx="10" fill="#1A2332" stroke="#42A5F5" stroke-width="1"/>
      <text x="80" y="618" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="32" font-weight="900" fill="#42A5F5">90</text>
      <text x="116" y="618" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">秒 alarm 触发</text>
      <text x="80" y="645" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#6B7280">CloudWatch period 60s + 1 datapoint</text>
    </g>
    <g id="stat-2">
      <rect x="320" y="580" width="240" height="80" rx="10" fill="#1A2332" stroke="#FF9800" stroke-width="1"/>
      <text x="340" y="618" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="32" font-weight="900" fill="#FF9800">15</text>
      <text x="376" y="618" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">+ 步调查链</text>
      <text x="340" y="645" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#6B7280">kubectl describe + EKS list + GitHub commit</text>
    </g>
    <g id="stat-3">
      <rect x="580" y="580" width="240" height="80" rx="10" fill="#1A2332" stroke="#4CAF50" stroke-width="1"/>
      <text x="600" y="618" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="32" font-weight="900" fill="#4CAF50">0</text>
      <text x="624" y="618" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">人工 query</text>
      <text x="600" y="645" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#6B7280">webhook 触发 + 主动 sub-agent 调度</text>
    </g>
  </g>

  <g id="page-footer">
    <text x="1220" y="694" text-anchor="end" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="11" fill="#6B7280">10 / 20</text>
  </g>
</svg>
