<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="stepGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F44336" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FF7043" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="stepGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9800" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFB74D" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="stepGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565C0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#42A5F5" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="stepGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#42A5F5" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#42A5F5" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="stepGrad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#81C784" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="stepGrad6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#9CCC65" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <g id="bg-base">
    <rect width="1280" height="720" fill="#0F1419"/>
  </g>

  <g id="page-header">
    <rect x="60" y="50" width="6" height="36" fill="#FF9800" rx="2"/>
    <text x="80" y="78" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" font-weight="600" fill="#FF9800" letter-spacing="3">C1 · 端到端流程</text>
    <text x="60" y="128" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="36" font-weight="800" fill="#E8EAED">90 秒自主调查 → 12 分钟出 RCA — <tspan fill="#FF9800">人没碰按钮</tspan></text>
  </g>

  <g id="step-1">
    <polygon points="60,210 240,210 280,255 240,300 60,300" fill="url(#stepGrad1)"/>
    <use data-icon="tabler-filled/bug" x="92" y="232" width="22" height="22" fill="#FFFFFF"/>
    <text x="120" y="250" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">① 注入</text>
    <text x="92" y="278" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.95">L6: 错误 image tag</text>
  </g>
  <g id="step-2">
    <polygon points="270,210 470,210 510,255 470,300 270,300 310,255" fill="url(#stepGrad2)"/>
    <use data-icon="tabler-filled/alert-hexagon" x="318" y="232" width="22" height="22" fill="#FFFFFF"/>
    <text x="346" y="250" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">② Pod 失败</text>
    <text x="318" y="278" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.95">ImagePullBackOff</text>
  </g>
  <g id="step-3">
    <polygon points="500,210 700,210 740,255 700,300 500,300 540,255" fill="url(#stepGrad3)"/>
    <use data-icon="tabler-filled/bolt" x="548" y="232" width="22" height="22" fill="#FFFFFF"/>
    <text x="576" y="250" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">③ Alarm</text>
    <text x="548" y="278" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.95">OK → ALARM</text>
  </g>
  <g id="step-4">
    <polygon points="730,210 930,210 970,255 930,300 730,300 770,255" fill="url(#stepGrad4)"/>
    <use data-icon="tabler-filled/building-bridge-2" x="778" y="232" width="22" height="22" fill="#FFFFFF"/>
    <text x="806" y="250" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">④ Bridge</text>
    <text x="778" y="278" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.95">SNS → Lambda → 200 OK</text>
  </g>
  <g id="step-5">
    <polygon points="960,210 1160,210 1200,255 1160,300 960,300 1000,255" fill="url(#stepGrad5)"/>
    <use data-icon="tabler-filled/eye" x="1008" y="232" width="22" height="22" fill="#FFFFFF"/>
    <text x="1036" y="250" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">⑤ Agent 调查</text>
    <text x="1008" y="278" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.95">15 步 · 自主</text>
  </g>
  <g id="step-6">
    <polygon points="430,360 1100,360 1160,420 1100,480 430,480 490,420" fill="url(#stepGrad6)"/>
    <use data-icon="tabler-filled/messages" x="478" y="395" width="32" height="32" fill="#FFFFFF"/>
    <text x="525" y="412" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF">⑥ RCA + 4 阶段 Mitigation + Slack 自主投递</text>
    <text x="525" y="446" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.95">Investigation started → Pod ImagePullBackOff → kubectl rollout undo</text>
    <text x="525" y="466" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.85">每条命令带 rollback + approval contract，等用户单步授权</text>
  </g>

  <g id="timing-line">
    <line x1="60" y1="540" x2="1220" y2="540" stroke="#2D3748" stroke-width="2"/>
    <text x="60" y="560" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="13" fill="#6B7280">T+0s</text>
    <text x="100" y="560" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#9AA0A6">注入故障</text>
    <circle cx="80" cy="540" r="5" fill="#F44336"/>

    <text x="265" y="560" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="13" fill="#6B7280">T+30s</text>
    <text x="310" y="560" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#9AA0A6">Pod ImagePullBackOff</text>
    <circle cx="285" cy="540" r="5" fill="#FF9800"/>

    <text x="510" y="560" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="13" fill="#6B7280">T+90s</text>
    <text x="555" y="560" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#9AA0A6">Alarm + Bridge</text>
    <circle cx="530" cy="540" r="5" fill="#1565C0"/>

    <text x="730" y="560" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="13" fill="#6B7280">T+93s</text>
    <text x="775" y="560" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#9AA0A6">Agent 自主接管</text>
    <circle cx="750" cy="540" r="5" fill="#42A5F5"/>

    <text x="1010" y="560" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="13" fill="#6B7280">T+12min</text>
    <text x="1075" y="560" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#4CAF50" font-weight="700">RCA Done</text>
    <circle cx="1030" cy="540" r="5" fill="#4CAF50"/>
  </g>

  <g id="bottom-callout">
    <rect x="60" y="600" width="1160" height="74" rx="10" fill="#1A2332" stroke="#FF9800" stroke-width="1"/>
    <use data-icon="tabler-filled/lock" x="80" y="624" width="24" height="24" fill="#FF9800"/>
    <text x="118" y="638" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="700" fill="#FF9800">Approval Contract</text>
    <text x="118" y="664" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">Mitigation 命令 <tspan fill="#E8EAED" font-weight="700">不会自动执行</tspan> — 每步等用户输入 "approve step N" 才动；这是 Skill 的 hard rule，抗 LLM 语义漂移</text>
  </g>

  <g id="page-footer">
    <text x="1220" y="710" text-anchor="end" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="11" fill="#6B7280">10 / 19</text>
  </g>
</svg>
