<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
  </defs>

  <g id="bg-base">
    <rect width="1280" height="720" fill="#0F1419"/>
  </g>

  <g id="page-header">
    <rect x="60" y="50" width="6" height="36" fill="#FF9800" rx="2"/>
    <text x="80" y="78" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" font-weight="600" fill="#FF9800" letter-spacing="3">客户场景</text>
    <text x="60" y="128" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="36" font-weight="800" fill="#E8EAED">客户问的真问题：<tspan fill="#FF9800">能不能用 DevOps Agent 管</tspan> ___ ?</text>
    <text x="60" y="160" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" fill="#9AA0A6">中国区 / 阿里云 / 自托管 K8s / 私有 SaaS API — 这些都在原生 association 范围之外</text>
  </g>

  <g id="card-left">
    <rect x="60" y="200" width="565" height="430" rx="14" fill="#1A2332" stroke="#2D3748" stroke-width="1"/>
    <rect x="60" y="200" width="565" height="50" rx="14" fill="#1565C0" fill-opacity="0.18"/>
    <rect x="60" y="240" width="565" height="10" fill="#1A2332"/>
    <use data-icon="tabler-filled/cloud" x="80" y="212" width="26" height="26" fill="#42A5F5"/>
    <text x="116" y="232" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" font-weight="700" fill="#42A5F5">Native 已支持的</text>

    <g id="card-left-row1">
      <use data-icon="tabler-filled/circle-check" x="84" y="280" width="18" height="18" fill="#4CAF50"/>
      <text x="112" y="295" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" fill="#E8EAED">AWS 全球区账号 — 一键关联</text>
    </g>
    <g id="card-left-row2">
      <use data-icon="tabler-filled/circle-check" x="84" y="335" width="18" height="18" fill="#4CAF50"/>
      <text x="112" y="350" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" fill="#E8EAED">CloudWatch / Splunk / Datadog / NewRelic</text>
    </g>
    <g id="card-left-row3">
      <use data-icon="tabler-filled/circle-check" x="84" y="390" width="18" height="18" fill="#4CAF50"/>
      <text x="112" y="405" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" fill="#E8EAED">GitHub / GitLab / Azure DevOps</text>
    </g>
    <g id="card-left-row4">
      <use data-icon="tabler-filled/circle-check" x="84" y="445" width="18" height="18" fill="#4CAF50"/>
      <text x="112" y="460" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" fill="#E8EAED">Slack / PagerDuty / ServiceNow</text>
    </g>
    <g id="card-left-row5">
      <use data-icon="tabler-filled/circle-check" x="84" y="500" width="18" height="18" fill="#4CAF50"/>
      <text x="112" y="515" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" fill="#E8EAED">Azure 资源</text>
    </g>
    <g id="card-left-row6">
      <use data-icon="tabler-filled/circle-check" x="84" y="555" width="18" height="18" fill="#4CAF50"/>
      <text x="112" y="570" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" fill="#E8EAED">6C 框架 + Webhook + Skills 三层</text>
    </g>
  </g>

  <g id="card-right">
    <rect x="655" y="200" width="565" height="430" rx="14" fill="#1A2332" stroke="#FF9800" stroke-width="1.5"/>
    <rect x="655" y="200" width="565" height="50" rx="14" fill="#FF9800" fill-opacity="0.16"/>
    <rect x="655" y="240" width="565" height="10" fill="#1A2332"/>
    <use data-icon="tabler-filled/world" x="675" y="212" width="26" height="26" fill="#FF9800"/>
    <text x="711" y="232" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" font-weight="700" fill="#FF9800">客户问 — 用 MCP 扩展的</text>

    <g id="card-right-row1">
      <text x="685" y="295" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="22" font-weight="900" fill="#FF9800">①</text>
      <text x="715" y="295" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" fill="#E8EAED">AWS 中国区 — 独立 partition，独立账号体系</text>
    </g>
    <g id="card-right-row2">
      <text x="685" y="350" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="22" font-weight="900" fill="#FF9800">②</text>
      <text x="715" y="350" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" fill="#E8EAED">阿里云 / 腾讯云 — 国内客户混合云常态</text>
    </g>
    <g id="card-right-row3">
      <text x="685" y="405" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="22" font-weight="900" fill="#FF9800">③</text>
      <text x="715" y="405" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" fill="#E8EAED">私有 K8s / on-prem — VPC 内不出公网</text>
    </g>
    <g id="card-right-row4">
      <text x="685" y="460" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="22" font-weight="900" fill="#FF9800">④</text>
      <text x="715" y="460" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" fill="#E8EAED">Customer-built SaaS / 内部平台 API</text>
    </g>
    <g id="card-right-row5">
      <text x="685" y="515" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="22" font-weight="900" fill="#FF9800">⑤</text>
      <text x="715" y="515" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" fill="#E8EAED">业务线工具栈 — Salesforce / Jira / 自研 CMDB</text>
    </g>

    <rect x="671" y="548" width="533" height="64" rx="8" fill="#0F1419" stroke="#FF9800" stroke-width="1" stroke-opacity="0.6"/>
    <text x="685" y="572" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">一句话：所有 native association 之外的资源</text>
    <text x="685" y="595" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#FF9800" font-weight="700">→ 都需要走 MCP server 扩展点</text>
  </g>

  <g id="page-footer">
    <text x="60" y="690" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="11" fill="#6B7280">中国区是一个具体场景；项目验证的是通用的 MCP 扩展模式</text>
    <text x="1220" y="690" text-anchor="end" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="11" fill="#6B7280">02 / 19</text>
  </g>
</svg>
