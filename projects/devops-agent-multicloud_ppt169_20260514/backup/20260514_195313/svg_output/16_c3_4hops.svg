<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="hopArrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>

  <g id="bg-base">
    <rect width="1280" height="720" fill="#0F1419"/>
  </g>

  <g id="page-header">
    <rect x="60" y="50" width="6" height="36" fill="#FF9800" rx="2"/>
    <text x="80" y="78" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" font-weight="600" fill="#FF9800" letter-spacing="3">C3 · 沿 4 跳追溯</text>
    <text x="60" y="128" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="36" font-weight="800" fill="#E8EAED">DDB → SQS → ECS → CloudTrail — Agent 自动跳转</text>
  </g>

  <g id="hops">
    <g id="hop-1">
      <rect x="60" y="200" width="260" height="120" rx="10" fill="#1A2332" stroke="#42A5F5" stroke-width="1.5"/>
      <text x="80" y="230" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" font-weight="700" fill="#42A5F5">跳 1 · 表象</text>
      <use data-icon="tabler-filled/database" x="80" y="246" width="20" height="20" fill="#42A5F5"/>
      <text x="108" y="262" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" font-weight="700" fill="#E8EAED">DynamoDB describe-table</text>
      <text x="80" y="290" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9AA0A6">看到 PROVISIONED 5 WCU</text>
      <text x="80" y="308" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9AA0A6">"为啥不是按需？" → 上溯</text>
    </g>

    <polygon points="320,255 350,245 350,255 372,255 350,265 350,265 320,265" fill="url(#hopArrow)"/>
    <line x1="320" y1="260" x2="350" y2="260" stroke="#42A5F5" stroke-width="2"/>

    <g id="hop-2">
      <rect x="370" y="200" width="260" height="120" rx="10" fill="#1A2332" stroke="#42A5F5" stroke-width="1.5"/>
      <text x="390" y="230" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" font-weight="700" fill="#42A5F5">跳 2 · 压力来源</text>
      <use data-icon="tabler-filled/messages" x="390" y="246" width="20" height="20" fill="#42A5F5"/>
      <text x="418" y="262" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" font-weight="700" fill="#E8EAED">SQS get-queue-attributes</text>
      <text x="390" y="290" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#FF9800">14272 条消息积压</text>
      <text x="390" y="308" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9AA0A6">"谁在写消息？" → 上溯</text>
    </g>

    <polygon points="630,255 660,245 660,255 682,255 660,265 660,265 630,265" fill="url(#hopArrow)"/>
    <line x1="630" y1="260" x2="660" y2="260" stroke="#42A5F5" stroke-width="2"/>

    <g id="hop-3">
      <rect x="680" y="200" width="260" height="120" rx="10" fill="#1A2332" stroke="#42A5F5" stroke-width="1.5"/>
      <text x="700" y="230" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" font-weight="700" fill="#42A5F5">跳 3 · 扩容动作</text>
      <use data-icon="tabler-filled/cloud-computing" x="700" y="246" width="20" height="20" fill="#42A5F5"/>
      <text x="728" y="262" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" font-weight="700" fill="#E8EAED">ECS describe-services</text>
      <text x="700" y="290" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#FF9800">desiredCount=5 (从 1 扩)</text>
      <text x="700" y="308" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9AA0A6">"谁改的？什么时候？" → 上溯</text>
    </g>

    <polygon points="940,255 970,245 970,255 992,255 970,265 970,265 940,265" fill="url(#hopArrow)"/>
    <line x1="940" y1="260" x2="970" y2="260" stroke="#42A5F5" stroke-width="2"/>

    <g id="hop-4">
      <rect x="990" y="200" width="230" height="120" rx="10" fill="#1A2332" stroke="#FF9800" stroke-width="1.5"/>
      <text x="1010" y="230" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" font-weight="700" fill="#FF9800">跳 4 · 锁定根因</text>
      <use data-icon="tabler-filled/clock-hour-1" x="1010" y="246" width="20" height="20" fill="#FF9800"/>
      <text x="1038" y="262" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" font-weight="700" fill="#E8EAED">CloudTrail lookup</text>
      <text x="1010" y="290" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#FF9800">manual ModifyTable</text>
      <text x="1010" y="308" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="11" fill="#FF9800">@07:18:17Z by CLI</text>
    </g>
  </g>

  <g id="rca-screenshot">
    <rect x="60" y="350" width="700" height="316" rx="12" fill="#1A2332" stroke="#FF9800" stroke-width="1.5"/>
    <image href="../images/case-3-03-rca-summary.png" x="80" y="370" width="660" height="276" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g id="key-finding">
    <rect x="790" y="350" width="430" height="316" rx="12" fill="#1A2332" stroke="#FF9800" stroke-width="1.5"/>
    <text x="810" y="384" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="800" fill="#FF9800">★ 关键洞察</text>
    <line x1="810" y1="396" x2="1200" y2="396" stroke="#FF9800" stroke-width="1"/>

    <text x="810" y="430" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" font-weight="700" fill="#E8EAED">Agent 区分 Terraform vs Manual CLI</text>
    <text x="810" y="454" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#9AA0A6">通过 CloudTrail user-agent 字段</text>
    <line x1="810" y1="468" x2="1200" y2="468" stroke="#2D3748" stroke-width="1"/>

    <text x="810" y="500" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12" fill="#4CAF50">2026-05-13T15:07:50Z</text>
    <text x="810" y="518" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9AA0A6">Terraform 创建：PAY_PER_REQUEST</text>

    <text x="810" y="544" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12" fill="#FF9800">2026-05-14T07:18:17Z</text>
    <text x="810" y="562" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#FF9800" font-weight="700">手动改：ClaudeCode-BH → 5 WCU</text>

    <line x1="810" y1="582" x2="1200" y2="582" stroke="#2D3748" stroke-width="1"/>
    <text x="810" y="606" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9AA0A6">+ 主动检查 application-autoscaling</text>
    <text x="810" y="622" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9AA0A6">  describe-scalable-targets → 没配兜底</text>
    <text x="810" y="650" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#FF9800" font-style="italic">这是真生产 SRE 才会确认的细节</text>
  </g>

  <g id="page-footer">
    <text x="60" y="694" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="11" fill="#6B7280">截图：cli-evidence/case3/PPT-NOTES.md · 完整 RCA 在 cli-evidence/case3/c3-journal-real.json</text>
    <text x="1220" y="694" text-anchor="end" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="11" fill="#6B7280">16 / 19</text>
  </g>
</svg>
