      <feOffset dx="0" dy="0" result="ob" />
      <feFlood flood-color="#42A5F5" flood-opacity="0.5" />
      <feComposite in2="ob" operator="in" />
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

