    <text x="60" y="128" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="36" font-weight="800" fill="#E8EAED">Webhook · MCP · Skill — 三层<tspan fill="#FF9800">缺一不可</tspan></text>
    <text x="60" y="160" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" fill="#9AA0A6">客户咨询时常把这三件事混淆 — 这页给一个清晰的 SA 答疑模板</text>
