      <text x="172" y="566" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="700" fill="#42A5F5">参考架构 — Bridge Pattern</text>
      <text x="138" y="600" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">EKS 上跑 MCP server，VPC Lattice</text>
      <text x="138" y="620" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">Private Connection，Helm chart 复用</text>
    </g>
    <g id="pillar-2">
      <path fill="#1A2332" stroke="#FF9800" stroke-width="1" stroke-opacity="0.5" d="M490,525 H790 A10,10 0 0 1 800,535 V625 A10,10 0 0 1 790,635 H490 A10,10 0 0 1 480,625 V535 A10,10 0 0 1 490,525 Z" />
      
  <g transform="translate(498.0, 545.0) scale(1.1666666666666667)" fill="#FF9800">
