<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="numberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9800" />
      <stop offset="100%" stop-color="#FFB74D" />
    </linearGradient>
    <radialGradient id="bgGlowCenter" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#1565C0" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#1565C0" stop-opacity="0" />
    </radialGradient>
    <filter id="numberGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur" />
      <feFlood flood-color="#FF9800" flood-opacity="0.45" />
      <feComposite in2="blur" operator="in" />
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <g id="bg-base">
    <rect width="1280" height="720" fill="#0F1419" />
    <rect width="1280" height="720" fill="url(#bgGlowCenter)" />
  </g>

  <g id="bg-decoration">
    <circle cx="180" cy="180" r="2" fill="#42A5F5" fill-opacity="0.5" />
    <circle cx="1100" cy="200" r="2" fill="#FF9800" fill-opacity="0.4" />
    <circle cx="220" cy="600" r="1.5" fill="#FF9800" fill-opacity="0.5" />
    <circle cx="1120" cy="580" r="1.5" fill="#42A5F5" fill-opacity="0.4" />
  </g>

  <g id="page-eyebrow">
    <text x="640" y="120" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" font-weight="600" fill="#FF9800" letter-spacing="6">交付的资产</text>
    <line x1="600" y1="135" x2="680" y2="135" stroke="#FF9800" stroke-width="2" />
  </g>

  <g id="page-title">
    <text x="640" y="200" text-anchor="middle" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="36" font-weight="800" fill="#E8EAED">一套可直接复刻的 6C 扩展模板</text>
  </g>

  <g id="hero-number">
    <text x="640" y="380" text-anchor="middle" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="160" font-weight="900" fill="url(#numberGrad)" filter="url(#numberGlow)">98</text>
    <text x="640" y="430" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="22" fill="#9AA0A6">单次 incident 调查中，6C 全套能力经 MCP 扩展点透明触达外部资源</text>
    <text x="640" y="466" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" font-weight="700" fill="#FF9800">扩展模式可移植：换 cloud / 换 partition / 换工具栈，pattern 不变</text>
  </g>

