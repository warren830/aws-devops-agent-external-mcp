  <g id="page-footer">
    <text x="60" y="690" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="11" fill="#6B7280">面向 SA 的可复用资产 — Bridge 架构 + Skill 模板 + 演示素材</text>
    <text x="1220" y="690" text-anchor="end" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="11" fill="#6B7280">03 / 19</text>
