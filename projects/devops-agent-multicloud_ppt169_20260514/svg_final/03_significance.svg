      <text x="532" y="566" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="700" fill="#FF9800">9 个 Skill — 三层模式</text>
      <text x="498" y="600" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">Foundation + Analytical + Pipeline</text>
      <text x="498" y="620" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">直接给客户作 SKILL.md 模板</text>
    </g>
    <g id="pillar-3">
      <path fill="#1A2332" stroke="#2D3748" stroke-width="1" d="M850,525 H1150 A10,10 0 0 1 1160,535 V625 A10,10 0 0 1 1150,635 H850 A10,10 0 0 1 840,625 V535 A10,10 0 0 1 850,525 Z" />
      
  <g transform="translate(858.0, 545.0) scale(1.1666666666666667)" fill="#4CAF50">
    <path d="M17 3.34a10 10 0 1 1 -14.995 8.984l-.005 -.324l.005 -.324a10 10 0 0 1 14.995 -8.336zm-1.293 5.953a1 1 0 0 0 -1.32 -.083l-.094 .083l-3.293 3.292l-1.293 -1.292l-.094 -.083a1 1 0 0 0 -1.403 1.403l.083 .094l2 2l.094 .083a1 1 0 0 0 1.226 0l.094 -.083l4 -4l.083 -.094a1 1 0 0 0 -.083 -1.32z" />
