      <text x="892" y="566" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="700" fill="#4CAF50">3 个完整 case 演示</text>
      <text x="858" y="600" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">Webhook 自主 / 时间锚定 / 多跳 RCA</text>
      <text x="858" y="620" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">客户演示 / POC 现成素材</text>
    </g>
