<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="hubGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <radialGradient id="hubBgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1565C0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1565C0" stop-opacity="0"/>
    </radialGradient>
    <filter id="hubGlowFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="0" result="ob"/>
      <feFlood flood-color="#42A5F5" flood-opacity="0.5"/>
      <feComposite in2="ob" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g id="bg-base">
