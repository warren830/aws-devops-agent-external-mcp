<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <g id="bg-base">
    <rect width="1280" height="720" fill="#0F1419"/>
  </g>

  <g id="page-header">
    <rect x="60" y="50" width="6" height="36" fill="#FF9800" rx="2"/>
    <text x="80" y="78" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" font-weight="600" fill="#FF9800" letter-spacing="3">职责分层</text>
    <text x="60" y="128" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="36" font-weight="800" fill="#E8EAED">Webhook · MCP · Skill — 三层<tspan fill="#FF9800">缺一不可</tspan></text>
    <text x="60" y="160" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" fill="#9AA0A6">客户咨询时常把这三件事混淆 — 这页给一个清晰的 SA 答疑模板</text>
  </g>

  <g id="card-webhook">
    <rect x="60" y="200" width="376" height="430" rx="14" fill="#1A2332" stroke="#42A5F5" stroke-width="1.5"/>
    <rect x="60" y="200" width="376" height="50" rx="14" fill="#1565C0" fill-opacity="0.22"/>
    <rect x="60" y="240" width="376" height="10" fill="#1A2332"/>
    <use data-icon="tabler-filled/bolt" x="80" y="212" width="26" height="26" fill="#42A5F5"/>
    <text x="116" y="232" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" font-weight="700" fill="#42A5F5">Webhook · 入口</text>

    <text x="80" y="290" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B7280" letter-spacing="2">职责</text>
    <text x="80" y="316" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" fill="#E8EAED">把外部告警变成 incident</text>
    <text x="80" y="338" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" fill="#E8EAED">— Agent 自主调查的起点</text>

    <line x1="80" y1="370" x2="416" y2="370" stroke="#2D3748" stroke-width="1"/>

    <text x="80" y="400" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B7280" letter-spacing="2">实现</text>
    <text x="80" y="426" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#E8EAED">SNS → bridge Lambda</text>
    <text x="80" y="448" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#E8EAED">→ HMAC 签名 → POST</text>
    <text x="80" y="478" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12" fill="#42A5F5">/devops-agent/webhook-url</text>

    <line x1="80" y1="510" x2="416" y2="510" stroke="#2D3748" stroke-width="1"/>

    <text x="80" y="540" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B7280" letter-spacing="2">缺它会怎样</text>
    <text x="80" y="568" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">Agent 看不到外部告警 —</text>
    <text x="80" y="588" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">"自主调查"无从触发</text>
    <text x="80" y="616" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" font-style="italic" fill="#9AA0A6">客户须自己拉过来才有事干</text>
  </g>

  <g id="card-mcp">
    <rect x="452" y="200" width="376" height="430" rx="14" fill="#1A2332" stroke="#FF9800" stroke-width="1.5"/>
    <rect x="452" y="200" width="376" height="50" rx="14" fill="#FF9800" fill-opacity="0.18"/>
    <rect x="452" y="240" width="376" height="10" fill="#1A2332"/>
    <use data-icon="tabler-filled/building-bridge-2" x="472" y="212" width="26" height="26" fill="#FF9800"/>
    <text x="508" y="232" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" font-weight="700" fill="#FF9800">MCP · 能力</text>

    <text x="472" y="290" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B7280" letter-spacing="2">职责</text>
    <text x="472" y="316" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" fill="#E8EAED">提供 Agent 调用外部资源</text>
    <text x="472" y="338" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" fill="#E8EAED">的工具（tool surface）</text>

    <line x1="472" y1="370" x2="808" y2="370" stroke="#2D3748" stroke-width="1"/>

    <text x="472" y="400" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B7280" letter-spacing="2">实现</text>
    <text x="472" y="426" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#E8EAED">MCP server pod (EKS)</text>
    <text x="472" y="448" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#E8EAED">+ VPC Lattice Private Conn</text>
    <text x="472" y="478" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12" fill="#FF9800">aws-api-mcp-server / 任意自建</text>

    <line x1="472" y1="510" x2="808" y2="510" stroke="#2D3748" stroke-width="1"/>

    <text x="472" y="540" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B7280" letter-spacing="2">缺它会怎样</text>
    <text x="472" y="568" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">Agent 没有 tool 可调外部资源</text>
    <text x="472" y="588" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">— 只能看 native association</text>
    <text x="472" y="616" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" font-style="italic" fill="#9AA0A6">客户私网 / 跨 partition 全靠这层</text>
  </g>

  <g id="card-skill">
    <rect x="844" y="200" width="376" height="430" rx="14" fill="#1A2332" stroke="#4CAF50" stroke-width="1.5"/>
    <rect x="844" y="200" width="376" height="50" rx="14" fill="#4CAF50" fill-opacity="0.18"/>
    <rect x="844" y="240" width="376" height="10" fill="#1A2332"/>
    <use data-icon="tabler-filled/code-circle" x="864" y="212" width="26" height="26" fill="#4CAF50"/>
    <text x="900" y="232" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" font-weight="700" fill="#4CAF50">Skill · 策略</text>

    <text x="864" y="290" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B7280" letter-spacing="2">职责</text>
    <text x="864" y="316" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" fill="#E8EAED">告诉 Agent 什么场景调什么</text>
    <text x="864" y="338" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" fill="#E8EAED">+ 怎么组织输出 + 加锁审核</text>

    <line x1="864" y1="370" x2="1200" y2="370" stroke="#2D3748" stroke-width="1"/>

    <text x="864" y="400" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B7280" letter-spacing="2">实现</text>
    <text x="864" y="426" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#E8EAED">SKILL.md (markdown only)</text>
    <text x="864" y="448" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#E8EAED">picker 按 description 选</text>
    <text x="864" y="478" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12" fill="#4CAF50">agentskills.io spec 子集</text>

    <line x1="864" y1="510" x2="1200" y2="510" stroke="#2D3748" stroke-width="1"/>

    <text x="864" y="540" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#6B7280" letter-spacing="2">缺它会怎样</text>
    <text x="864" y="568" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">Agent 知道工具但不知何时</text>
    <text x="864" y="588" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">用 — 输出格式发散，approval 不约束</text>
    <text x="864" y="616" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" font-style="italic" fill="#9AA0A6">实测调查质量 30% → 60%+</text>
  </g>

  <g id="bottom-quote">
    <rect x="60" y="650" width="1160" height="40" rx="6" fill="#0F1419" stroke="#FF9800" stroke-width="1"/>
    <text x="640" y="676" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" font-weight="700" fill="#FF9800">Webhook 把告警拉过来 · MCP 把外部资源接上来 · Skill 让 Agent 知道怎么用 — 三件事各管各的</text>
  </g>

  <g id="page-footer">
    <text x="1220" y="710" text-anchor="end" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="11" fill="#6B7280">09 / 20</text>
  </g>
</svg>
