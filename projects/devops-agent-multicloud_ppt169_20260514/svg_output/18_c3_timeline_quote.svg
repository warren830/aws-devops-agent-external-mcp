<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <g id="bg-base">
    <rect width="1280" height="720" fill="#0F1419"/>
  </g>

  <g id="page-header">
    <rect x="60" y="50" width="6" height="36" fill="#FF9800" rx="2"/>
    <text x="80" y="78" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" font-weight="600" fill="#FF9800" letter-spacing="3">C3 · 调查 timeline + agent 自己的话</text>
    <text x="60" y="128" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="32" font-weight="800" fill="#E8EAED">第二个中国区账号也同样跑通 — <tspan fill="#FF9800">aws-cn-2.yingchu.cloud</tspan> Bridge</text>
  </g>

  <g id="quote-block">
    <rect x="60" y="180" width="720" height="490" rx="12" fill="#1A2332" stroke="#FF9800" stroke-width="1.5"/>
    <rect x="60" y="180" width="6" height="490" fill="#FF9800" rx="2"/>
    <text x="100" y="218" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" font-weight="800" fill="#FF9800">★ Agent 自己写的根本原因</text>
    <line x1="100" y1="232" x2="760" y2="232" stroke="#FF9800" stroke-width="1"/>

    <text x="100" y="278" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" font-weight="700" fill="#E8EAED">手动将 etl-state 表从按需模式降级为预置 5 WCU</text>

    <text x="100" y="318" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">"AdminCYC 在 <tspan fill="#FF9800" font-family="Consolas, &quot;Courier New&quot;, monospace" font-weight="700">2026-05-14T07:18:17Z</tspan> 通过 AWS CLI</text>
    <text x="100" y="338" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">(<tspan fill="#FF9800" font-family="Consolas, &quot;Courier New&quot;, monospace" font-weight="700">ClaudeCode-BH</tspan>) 将 etl-state DynamoDB 表的计费模式从</text>
    <text x="100" y="358" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6"><tspan font-family="Consolas, &quot;Courier New&quot;, monospace">PAY_PER_REQUEST</tspan> 手动变更为 <tspan font-family="Consolas, &quot;Courier New&quot;, monospace">PROVISIONED</tspan> 模式，仅设置了</text>
    <text x="100" y="378" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">5 WCU 的写入容量..."</text>

    <text x="100" y="416" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#E8EAED">"CloudTrail 记录显示该表最初由 <tspan fill="#42A5F5" font-weight="700">Terraform 以按需模式</tspan></text>
    <text x="100" y="436" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#E8EAED">创建（<tspan font-family="Consolas, &quot;Courier New&quot;, monospace">2026-05-13T15:07:50Z</tspan>），<tspan fill="#4CAF50" font-weight="700">不存在节流风险</tspan>。"</text>

    <text x="100" y="476" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">"这一手动变更直接引入了每秒 5 次写入的硬性限制，</text>
    <text x="100" y="496" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9AA0A6">而 ETL 工作负载的突发写入需求远超此值（实测约 300 WCU/分钟）"</text>

    <line x1="100" y1="528" x2="760" y2="528" stroke="#2D3748" stroke-width="1"/>

    <use data-icon="tabler-filled/circle-check" x="100" y="548" width="22" height="22" fill="#4CAF50"/>
    <text x="130" y="565" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" font-weight="700" fill="#4CAF50">Agent 通过 user-agent 字段，区分了两种"创建源"</text>

    <text x="130" y="595" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#9AA0A6">这是经验丰富的 SRE 才会主动确认的细节 — agent</text>
    <text x="130" y="615" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#9AA0A6">自己想到去检查 application-autoscaling 是不是配了兜底</text>

    <text x="130" y="650" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" font-style="italic" fill="#FF9800">— 这就是 6C 框架里的 Continuous Learning 落地</text>
  </g>

  <g id="timeline-screenshot">
    <rect x="800" y="180" width="420" height="490" rx="12" fill="#1A2332" stroke="#2D3748" stroke-width="1"/>
    <image href="../images/case-3-02-investigation-timeline.png" x="816" y="196" width="388" height="438" preserveAspectRatio="xMidYMid meet"/>
    <text x="816" y="660" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="13" font-weight="700" fill="#42A5F5">Agent 调查 timeline</text>
    <text x="816" y="678" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9AA0A6">DDB / SQS / ECS / CloudTrail 4 个 sub-agent 并行</text>
  </g>

  <g id="page-footer">
    <text x="1220" y="710" text-anchor="end" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="11" fill="#6B7280">18 / 20</text>
  </g>
</svg>
