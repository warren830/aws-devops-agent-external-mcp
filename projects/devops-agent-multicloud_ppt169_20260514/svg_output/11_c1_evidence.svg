<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <g id="bg-base">
    <rect width="1280" height="720" fill="#0F1419"/>
  </g>

  <g id="page-header">
    <rect x="60" y="50" width="6" height="36" fill="#FF9800" rx="2"/>
    <text x="80" y="78" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" font-weight="600" fill="#FF9800" letter-spacing="3">C1 · 现场证据</text>
    <text x="60" y="128" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="36" font-weight="800" fill="#E8EAED">不是手画占位 — 是<tspan fill="#FF9800">真 agent</tspan>真截图</text>
  </g>

  <g id="evidence-1">
    <rect x="60" y="190" width="580" height="220" rx="10" fill="#1A2332" stroke="#2D3748" stroke-width="1"/>
    <image href="../images/case-1-07-eks-pod-failed.png" x="76" y="206" width="548" height="138" preserveAspectRatio="xMidYMid meet"/>
    <text x="76" y="375" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" font-weight="700" fill="#42A5F5">① kubectl 终端：3 Running + 1 ImagePullBackOff</text>
    <text x="76" y="396" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#9AA0A6">L6 注入 30 秒后，新 pod 卡在 ImagePullBackOff（红字证据）</text>
  </g>

  <g id="evidence-2">
    <rect x="660" y="190" width="560" height="220" rx="10" fill="#1A2332" stroke="#2D3748" stroke-width="1"/>
    <image href="../images/case-1-06-cloudwatch-alarm.png" x="676" y="206" width="528" height="148" preserveAspectRatio="xMidYMid meet"/>
    <text x="676" y="375" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" font-weight="700" fill="#42A5F5">② CloudWatch Alarm 跳变 OK → ALARM</text>
    <text x="676" y="396" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#9AA0A6">告警状态条从绿色翻红色（pod_status_pending ≥ 1）</text>
  </g>

  <g id="evidence-3">
    <rect x="60" y="430" width="580" height="240" rx="10" fill="#1A2332" stroke="#FF9800" stroke-width="1.5"/>
    <image href="../images/case-1-03-rca-report.png" x="76" y="446" width="548" height="156" preserveAspectRatio="xMidYMid meet"/>
    <text x="76" y="630" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" font-weight="700" fill="#FF9800">③ RCA 报告 — 调查摘要 + 根本原因 + 主要发现</text>
    <text x="76" y="652" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#9AA0A6">"image tag v1.2.4-DOES-NOT-EXIST 拉取失败" — 引用具体 commit</text>
  </g>

  <g id="evidence-4">
    <rect x="660" y="430" width="560" height="240" rx="10" fill="#1A2332" stroke="#4CAF50" stroke-width="1.5"/>
    <image href="../images/case-1-05-slack-thread.png" x="676" y="446" width="528" height="156" preserveAspectRatio="xMidYMid meet"/>
    <text x="676" y="630" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" font-weight="700" fill="#4CAF50">④ Slack — agent 自主投递 "Investigation started"</text>
    <text x="676" y="652" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#9AA0A6">12:17 BJ — 凌晨 3 点 on-call 工程师没醒，agent 已经接手</text>
  </g>

  <g id="page-footer">
    <text x="60" y="694" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="11" fill="#6B7280">所有截图保存于 blog/screenshots/case-1-*.png · 完整 7 张存档于 cli-evidence/case1/</text>
    <text x="1220" y="694" text-anchor="end" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="11" fill="#6B7280">11 / 19</text>
  </g>
</svg>
