<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="layerFoundation" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565C0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#42A5F5" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="layerAnalytical" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9800" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFB74D" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="layerPipeline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F44336" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF7043" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="layerTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#81C784" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <g id="bg-base">
    <rect width="1280" height="720" fill="#0F1419"/>
  </g>

  <g id="page-header">
    <rect x="60" y="50" width="6" height="36" fill="#FF9800" rx="2"/>
    <text x="80" y="78" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" font-weight="600" fill="#FF9800" letter-spacing="3">PART 3 · SKILLS</text>
    <text x="60" y="128" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="36" font-weight="800" fill="#E8EAED"><tspan fill="#FF9800">9</tspan> 个 Skill, 分三层 — 让 Agent 真正懂中国区</text>
    <text x="60" y="160" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" fill="#9AA0A6">Skill 是策略层 — Foundation 兜底，分析层应需调用，Pipeline 走故事剧本</text>
  </g>

  <g id="pyramid-top">
    <polygon points="540,210 740,210 700,260 580,260" fill="url(#layerTop)" stroke="#4CAF50" stroke-width="1"/>
    <text x="640" y="240" text-anchor="middle" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">cn-partition-arn-routing</text>
  </g>

  <g id="pyramid-pipeline">
    <polygon points="500,270 780,270 740,330 540,330" fill="url(#layerPipeline)" stroke="#F44336" stroke-width="1"/>
    <text x="640" y="295" text-anchor="middle" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" font-weight="800" fill="#FFFFFF">Pipeline 层 — 4 个 Skill</text>
    <text x="640" y="318" text-anchor="middle" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12" fill="#FFFFFF" fill-opacity="0.9">prevention · triage · rca · mitigation</text>
  </g>

  <g id="pyramid-analytical">
    <polygon points="450,340 830,340 790,410 490,410" fill="url(#layerAnalytical)" stroke="#FF9800" stroke-width="1"/>
    <text x="640" y="367" text-anchor="middle" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" font-weight="800" fill="#FFFFFF">分析层 — 3 个 Skill</text>
    <text x="640" y="392" text-anchor="middle" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12" fill="#FFFFFF" fill-opacity="0.9">inventory-compare · cost-attribution · security-posture-check</text>
  </g>

  <g id="pyramid-foundation">
    <polygon points="380,420 900,420 860,510 420,510" fill="url(#layerFoundation)" stroke="#1565C0" stroke-width="1"/>
    <text x="640" y="450" text-anchor="middle" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" font-weight="800" fill="#FFFFFF">Foundation 层 — 1 个 Skill</text>
    <text x="640" y="478" text-anchor="middle" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12" fill="#FFFFFF" fill-opacity="0.9">china-region-multi-account-routing</text>
    <text x="640" y="495" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="11" fill="#FFFFFF" fill-opacity="0.8">aws-cn = 北京 · aws-cn-2 = 宁夏 — 所有 skill 隐式依赖</text>
  </g>

  <g id="annotation-foundation">
    <line x1="380" y1="465" x2="220" y2="465" stroke="#1565C0" stroke-width="1.5"/>
    <circle cx="220" cy="465" r="5" fill="#1565C0"/>
    <rect x="60" y="430" width="155" height="80" rx="8" fill="#1A2332" stroke="#1565C0" stroke-width="1"/>
    <use data-icon="tabler-filled/world" x="76" y="446" width="18" height="18" fill="#1565C0"/>
    <text x="100" y="460" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="13" font-weight="700" fill="#42A5F5">Foundation</text>
    <text x="76" y="486" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9AA0A6">所有 skill 都引用</text>
    <text x="76" y="502" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9AA0A6">的账号路由表</text>
  </g>

  <g id="annotation-analytical">
    <line x1="900" y1="375" x2="1060" y2="375" stroke="#FF9800" stroke-width="1.5"/>
    <circle cx="1060" cy="375" r="5" fill="#FF9800"/>
    <rect x="1065" y="340" width="155" height="80" rx="8" fill="#1A2332" stroke="#FF9800" stroke-width="1"/>
    <use data-icon="tabler-filled/eye" x="1081" y="356" width="18" height="18" fill="#FF9800"/>
    <text x="1105" y="370" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="13" font-weight="700" fill="#FF9800">分析层</text>
    <text x="1081" y="396" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9AA0A6">用户主动 query 时</text>
    <text x="1081" y="412" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9AA0A6">激活 (Generic agent)</text>
  </g>

  <g id="annotation-pipeline">
    <line x1="780" y1="295" x2="940" y2="295" stroke="#F44336" stroke-width="1.5"/>
    <circle cx="940" cy="295" r="5" fill="#F44336"/>
    <rect x="945" y="260" width="155" height="80" rx="8" fill="#1A2332" stroke="#F44336" stroke-width="1"/>
    <use data-icon="tabler-filled/bolt" x="961" y="276" width="18" height="18" fill="#F44336"/>
    <text x="985" y="290" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="13" font-weight="700" fill="#F44336">Pipeline</text>
    <text x="961" y="316" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9AA0A6">Webhook 触发后,</text>
    <text x="961" y="332" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9AA0A6">逐级 handoff</text>
  </g>

  <g id="annotation-top">
    <line x1="500" y1="240" x2="340" y2="240" stroke="#4CAF50" stroke-width="1.5"/>
    <circle cx="340" cy="240" r="5" fill="#4CAF50"/>
    <rect x="180" y="205" width="155" height="80" rx="8" fill="#1A2332" stroke="#4CAF50" stroke-width="1"/>
    <use data-icon="tabler-filled/code-circle" x="196" y="221" width="18" height="18" fill="#4CAF50"/>
    <text x="220" y="235" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="13" font-weight="700" fill="#4CAF50">领域知识</text>
    <text x="196" y="261" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9AA0A6">补 agent 的中国</text>
    <text x="196" y="277" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#9AA0A6">区 partition 盲区</text>
  </g>

  <g id="bottom-summary">
    <rect x="60" y="555" width="1160" height="100" rx="10" fill="#1A2332" stroke="#2D3748" stroke-width="1"/>
    <text x="80" y="588" font-family="SimHei, &quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="700" fill="#FF9800">分层为什么有用</text>
    <text x="80" y="616" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#E8EAED">1. <tspan fill="#FF9800" font-weight="700">复用</tspan> — Foundation 层一份知识，6 个上层 skill 隐式继承；不重复维护</text>
    <text x="80" y="638" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#E8EAED">2. <tspan fill="#FF9800" font-weight="700">按需激活</tspan> — Pipeline 4 个 skill 用 Agent Type 锁死，避免 Generic agent 加载浪费 context</text>
    <text x="80" y="660" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#E8EAED">3. <tspan fill="#FF9800" font-weight="700">演进路径清晰</tspan> — 加新领域知识 = 加 partition skill；加新 case = 加 pipeline skill</text>
  </g>

  <g id="page-footer">
    <text x="60" y="694" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="11" fill="#6B7280">来源：blog/03-skills-in-action.md §3 三层架构图</text>
    <text x="1220" y="694" text-anchor="end" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="11" fill="#6B7280">07 / 19</text>
  </g>
